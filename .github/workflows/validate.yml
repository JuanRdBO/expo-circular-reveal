name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  biome:
    name: Biome (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: biomejs/setup-biome@v2
      - run: biome ci packages/expo-circular-reveal/src/

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - run: bun run typecheck

  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: |
          SWIFTLINT_VERSION=0.57.0
          curl -sL "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/swiftlint_linux.zip" -o swiftlint.zip
          unzip -q swiftlint.zip swiftlint
          chmod +x swiftlint
          sudo mv swiftlint /usr/local/bin/
      - run: swiftlint lint --strict ios/
        working-directory: packages/expo-circular-reveal

  ktlint:
    name: ktlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ktlint
        run: |
          KTLINT_VERSION=1.5.0
          curl -sL "https://github.com/pinterest/ktlint/releases/download/${KTLINT_VERSION}/ktlint" -o ktlint
          chmod +x ktlint
          sudo mv ktlint /usr/local/bin/
      - run: ktlint "packages/expo-circular-reveal/android/src/**/*.kt"
